<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
        Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #1f2328;
      background: #fff;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    h1 .icon {
      width: 18px;
      height: 18px;
      background: #24292e;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #58a6ff;
      font-family: monospace;
      font-size: 8px;
      font-weight: 700;
    }

    .field {
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      line-height: 1.4;
    }

    label.row {
      justify-content: space-between;
    }

    .label-text {
      flex: 1;
    }

    .sublabel {
      display: block;
      font-size: 11px;
      color: #656d76;
      margin-top: 1px;
    }

    input[type="number"] {
      width: 52px;
      padding: 3px 6px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      text-align: center;
      flex-shrink: 0;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.2);
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      accent-color: #0969da;
    }

    hr {
      border: none;
      border-top: 1px solid #d8dee4;
      margin: 12px 0;
    }

    .saved {
      font-size: 11px;
      color: #1a7f37;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      margin-top: 8px;
    }

    .saved.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1><span class="icon">72</span> Commit Message Helper</h1>

  <div class="field">
    <label class="row">
      <span class="label-text">
        Title width
        <span class="sublabel">Character limit for subject line</span>
      </span>
      <input type="number" id="titleLimit" min="20" max="200" value="72">
    </label>
  </div>

  <div class="field">
    <label class="row">
      <span class="label-text">
        Body width
        <span class="sublabel">Wrap column for extended description</span>
      </span>
      <input type="number" id="bodyWrap" min="20" max="200" value="72">
    </label>
  </div>

  <hr>

  <div class="field">
    <label>
      <input type="checkbox" id="autoFormat" checked>
      <span class="label-text">
        Auto-format on load
        <span class="sublabel">Strip markdown &amp; reflow when merge dialog opens</span>
      </span>
    </label>
  </div>

  <div class="saved" id="saved">Settings saved</div>

  <script src="popup.js"></script>
</body>
</html>
